name: termoplan
description: "TermoPlan uygulaması"
publish_to: 'none'
version: 1.0.0+19
environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  pdf: ^3.12.0
  printing: ^5.14.3
  path_provider: ^2.1.5
  intl: ^0.20.2
  open_filex: ^4.7.0
  url_launcher: ^6.2.6
  share_plus: ^7.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/header/
    - assets/fonts/Roboto-Regular.ttf
    - assets/fonts/Roboto-Bold.ttf

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/app_icon.png